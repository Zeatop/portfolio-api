apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-api
  labels:
    app: portfolio-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: portfolio-api
    spec:
      containers:
        - name: portfolio-api
          image: 10.0.0.10:5000/portfolio-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: ALLOWED_ORIGIN
              value: "https://leo-jackson.com"
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: portfolio-api-secrets
                  key: resend-api-key
            - name: MAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: portfolio-api-secrets
                  key: mail-from
            - name: MAIL_TO
              valueFrom:
                secretKeyRef:
                  name: portfolio-api-secrets
                  key: mail-to
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-api
  labels:
    app: portfolio-api
spec:
  type: ClusterIP
  selector:
    app: portfolio-api
  ports:
    - port: 3001
      targetPort: http
      name: http